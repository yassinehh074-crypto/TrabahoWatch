  <!-- Icon: briefcase with checkmark -->
  <rect x="2" y="10" width="26" height="20" rx="3"
        fill="none" stroke="#164896" stroke-width="2.5"/>
  <path d="M10 10V7a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v3"
