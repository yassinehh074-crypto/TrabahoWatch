<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     role="img"
     aria-label="TrabahoWatch — Philippine Job Information">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#164896"/>
      <stop offset="100%" stop-color="#0f3172"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#164896"/>
    </linearGradient>
  </defs>

  <!-- Background rect -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="80"  r="220" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1050" cy="550" r="160" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100"  cy="500" r="180" fill="rgba(255,255,255,0.03)"/>

  <!-- Accent bar -->
  <rect x="80" y="280" width="6" height="110"
        rx="3" fill="url(#accent)"/>

  <!-- Icon: briefcase -->
  <rect x="80" y="100" width="110" height="85" rx="12"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="6"/>
  <path d="M112 100V86a14 14 0 0 1 14-14h48a14 14 0 0 1 14 14v14"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="6"/>
  <polyline points="100 145 120 165 170 122"
            fill="none" stroke="#22d3ee" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main Headline -->
  <text x="230" y="155"
        font-family="Inter, -apple-system, sans-serif"
        font-size="80"
        font-weight="800"
        fill="white"
        letter-spacing="-1">Trabaho</text>
  <text x="612" y="155"
        font-family="Inter, -apple-system, sans-serif"
        font-size="80"
        font-weight="800"
        fill="#22d3ee"
        letter-spacing="-1">Watch</text>

  <!-- Tagline -->
  <text x="100" y="310"
        font-family="Inter, -apple-system, sans-serif"
        font-size="36"
        font-weight="400"
        fill="rgba(255,255,255,0.85)"
        letter-spacing="0">Philippine Job Information Platform</text>

  <!-- Sub-tagline -->
  <text x="100" y="370"
        font-family="Inter, -apple-system, sans-serif"
        font-size="28"
        font-weight="400"
        fill="rgba(255,255,255,0.6)">Government · Private · OFW · Salary Grades</text>

  <!-- Bottom stats bar -->
  <rect x="80" y="460" width="1040" height="110" rx="16"
        fill="rgba(255,255,255,0.08)"/>

  <text x="160" y="505"
        font-family="Inter, -apple-system, sans-serif"
        font-size="40" font-weight="800" fill="white">18+</text>
  <text x="160" y="540"
        font-family="Inter, -apple-system, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.6)">Job Listings</text>

  <line x1="380" y1="475" x2="380" y2="560"
        stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="440" y="505"
        font-family="Inter, -apple-system, sans-serif"
        font-size="40" font-weight="800" fill="white">3</text>
  <text x="440" y="540"
        font-family="Inter, -apple-system, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.6)">Sectors</text>

  <line x1="600" y1="475" x2="600" y2="560"
        stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="660" y="505"
        font-family="Inter, -apple-system, sans-serif"
        font-size="40" font-weight="800" fill="white">Free</text>
  <text x="660" y="540"
        font-family="Inter, -apple-system, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.6)">No Account Needed</text>

  <line x1="900" y1="475" x2="900" y2="560"
        stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="960" y="505"
        font-family="Inter, -apple-system, sans-serif"
        font-size="32" font-weight="800" fill="white">SSL VI</text>
  <text x="960" y="540"
        font-family="Inter, -apple-system, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.6)">2026 Salary Data</text>

  <!-- URL -->
  <text x="1120" y="600"
        font-family="Inter, -apple-system, sans-serif"
        font-size="22"
        font-weight="600"
        fill="rgba(255,255,255,0.4)"
        text-anchor="end">trabahowatch.com</text>

</svg>